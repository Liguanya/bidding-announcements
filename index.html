        .pagination button.active { background: #667eea; color: white; border-color: #667eea; }

        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 16px; padding: 30px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .modal-title { font-size: 18px; color: #333; flex: 1; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
        .detail-section { margin-bottom: 16px; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 8px; display: none; z-index: 2000; }

        @media (max-width: 768px) { .stats { grid-template-columns: repeat(2, 1fr); } .filter-row { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📢 招标公告推送平台</h1>
            <p class="header-subtitle">实时推送政府采购招标公告，助您把握商机</p>
            <div class="stats">
                <div class="stat-card"><div class="stat-label">总公告数</div><div class="stat-value" id="totalCount">-</div></div>
                <div class="stat-card green"><div class="stat-label">今日新增</div><div class="stat-value" id="todayCount">-</div></div>
                <div class="stat-card orange"><div class="stat-label">天津地区</div><div class="stat-value" id="tjCount">-</div></div>
                <div class="stat-card"><div class="stat-label">全国公告</div><div class="stat-value" id="nationCount">-</div></div>
            </div>
        </div>
        <div class="filters">
            <div class="filter-row">
                <div class="filter-group"><label>日期</label><select id="filterDate"><option value="">全部日期</option></select></div>
                <div class="filter-group"><label>关键词</label><select id="filterKeyword"><option value="">全部关键词</option><option value="造价">造价</option><option value="全过程咨询">全过程咨询</option><option value="招标代理">招标代理</option><option value="项目管理">项目管理</option></select></div>
                <div class="filter-group"><label>来源</label><select id="filterSource"><option value="">全部来源</option><option value="中国政府采购网">中国政府采购网</option><option value="天津">天津</option></select></div>
                <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 搜索公告标题..."></div>
                <button onclick="resetFilters()" style="padding:10px 20px;border:1px solid #e0e0e0;border-radius:8px;background:white;cursor:pointer;">🔄 重置</button>
            </div>
        </div>
        <div class="announcement-list">
            <h3 style="margin-bottom:20px;">📋 公告列表 <span id="resultCount"></span></h3>
            <div id="announcementList"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header"><h2 class="modal-title" id="modalTitle"></h2><button class="modal-close" onclick="closeModal()">×</button></div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        let allAnnouncements = [], filteredAnnouncements = [], currentPage = 1, pageSize = 15;
        const FAVORITES_KEY = 'bidding_favorites';
        function getFavorites() { return JSON.parse(localStorage.getItem(FAVORITES_KEY) || '[]'); }
        document.addEventListener('DOMContentLoaded', function() { loadData(); setupFilters(); document.getElementById('searchInput').addEventListener('input', handleSearch); });
        function loadData() {
            try {
                const data = EMBEDDED_DATA;
                allAnnouncements = (data.announcements || []).map(item => ({...item, dateKey: item.dateKey || (item.pubDate ? item.pubDate.replace(/-/g, '') : '')}));
                filteredAnnouncements = [...allAnnouncements];
                updateStats(); initFilterOptions(); renderAnnouncements();
            } catch (error) { console.error('加载数据失败:', error); document.getElementById('announcementList').innerHTML = '<p style="text-align:center;color:#999;">数据加载失败</p>'; }
        }
        function updateStats() {
            const today = new Date().toISOString().split('T')[0].replace(/-/g, '');
            document.getElementById('totalCount').textContent = allAnnouncements.length;
            document.getElementById('todayCount').textContent = allAnnouncements.filter(a => a.dateKey === today).length;
            document.getElementById('tjCount').textContent = allAnnouncements.filter(a => (a.source + a.link).includes('天津')).length;
            document.getElementById('nationCount').textContent = allAnnouncements.length;
        }
        function initFilterOptions() {
            const dateSelect = document.getElementById('filterDate');
            [...new Set(allAnnouncements.map(a => a.dateKey))].filter(d => d).sort().reverse().forEach(date => {
                const opt = document.createElement('option'); opt.value = date; opt.textContent = date.slice(0,4) + '-' + date.slice(4,6) + '-' + date.slice(6,8); dateSelect.appendChild(opt);
            });
        }
        function setupFilters() { ['filterDate', 'filterKeyword', 'filterSource'].forEach(id => document.getElementById(id).addEventListener('change', applyFilters)); }
        function applyFilters() {
            const date = document.getElementById('filterDate').value, keyword = document.getElementById('filterKeyword').value, source = document.getElementById('filterSource').value, search = document.getElementById('searchInput').value.toLowerCase();
            filteredAnnouncements = allAnnouncements.filter(item => {
                if (date && item.dateKey !== date) return false;
                if (keyword && !item.keywords.includes(keyword)) return false;
                if (source && !(item.source + item.link).includes(source)) return false;
                if (search && !item.title.toLowerCase().includes(search)) return false;
                return true;
            });
            currentPage = 1; renderAnnouncements();
        }
        function handleSearch() { applyFilters(); }
        function resetFilters() { document.getElementById('filterDate').value = ''; document.getElementById('filterKeyword').value = ''; document.getElementById('filterSource').value = ''; document.getElementById('searchInput').value = ''; filteredAnnouncements = [...allAnnouncements]; currentPage = 1; renderAnnouncements(); }
        function renderAnnouncements() {
            const list = document.getElementById('announcementList'), start = (currentPage - 1) * pageSize, end = start + pageSize, pageItems = filteredAnnouncements.slice(start, end);
            document.getElementById('resultCount').textContent = '共 ' + filteredAnnouncements.length + ' 条公告';
            if (pageItems.length === 0) { list.innerHTML = '<p style="text-align:center;color:#999;padding:40px;">暂无公告</p>'; document.getElementById('pagination').innerHTML = ''; return; }
            list.innerHTML = pageItems.map(item => {
                const dateStr = item.dateKey ? item.dateKey.slice(0,4) + '-' + item.dateKey.slice(4,6) + '-' + item.dateKey.slice(6,8) : '';
                return '<div class="announcement-item" onclick="showDetail(' + item.id + ')"><div class="item-title">' + item.title + '</div><div class="item-meta">' + (item.source ? '<span class="meta-tag source">' + item.source + '</span>' : '') + item.keywords.map(k => '<span class="meta-tag keyword">' + k + '</span>').join('') + '</div><div class="item-date">📅 ' + dateStr + '</div></div>';
            }).join('');
            const totalPages = Math.ceil(filteredAnnouncements.length / pageSize), pagination = document.getElementById('pagination');
            pagination.innerHTML = totalPages <= 1 ? '' : Array.from({length: totalPages}, (_, i) => '<button class="' + (i+1 === currentPage ? 'active' : '') + '" onclick="goToPage(' + (i+1) + ')">' + (i+1) + '</button>').join('');
        }
        function goToPage(page) { currentPage = page; renderAnnouncements(); }
        function showDetail(id) {
            const item = allAnnouncements.find(a => a.id === id); if (!item) return;
            const dateStr = item.dateKey ? item.dateKey.slice(0,4) + '-' + item.dateKey.slice(4,6) + '-' + item.dateKey.slice(6,8) : '';
            let bodyHtml = '<div class="detail-section"><h4>📅 发布时间</h4><div class="detail-content">' + dateStr + '</div></div><div class="detail-section"><h4>🌐 来源</h4><div class="detail-content">' + (item.source || '未知') + '</div></div>';
            if (item.keywords && item.keywords.length > 0) bodyHtml += '<div class="detail-section"><h4>🏷️ 匹配关键词</h4><div class="detail-content">' + item.keywords.join(', ') + '</div></div>';
            // 检查链接是否是有效的URL格式
            const linkText = item.link || '';
            const isValidUrl = linkText.startsWith('http://') || linkText.startsWith('https://');
            if (isValidUrl) {
                bodyHtml += '<div class="detail-section"><h4>🔗 公告链接</h4><div class="detail-content"><a href="' + linkText + '" target="_blank" class="detail-link">🔗 点击查看公告原文</a></div></div>';
            } else if (linkText && linkText !== 'null') {
                bodyHtml += '<div class="detail-section"><h4>📌 来源说明</h4><div class="detail-content">' + linkText + '</div></div>';
            }
            // 添加搜索原文按钮
            const searchTitle = encodeURIComponent(item.title);
            bodyHtml += '<div class="detail-section"><h4>🔍 搜索原文</h4><div class="detail-content">';
            bodyHtml += '<a href="https://www.baidu.com/s?wd=' + searchTitle + '" target="_blank" class="detail-link" style="margin-right:15px;">🔎 百度搜索</a>';
            bodyHtml += '<a href="https://www.google.com/search?q=' + searchTitle + '" target="_blank" class="detail-link">🌐 Google搜索</a>';
            bodyHtml += '</div></div>';
            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('modalBody').innerHTML = bodyHtml;
            document.getElementById('modalOverlay').classList.add('active');
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
