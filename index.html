let currentPage = 1;
const pageSize = 20;
let filteredData = [...DATA.announcements];

function renderAnnouncements(page) {
    const list = document.getElementById('announcementsList');
    const start = (page - 1) * pageSize;
    const end = start + pageSize;
    const pageData = filteredData.slice(start, end);
    
    if (pageData.length === 0) {
        list.innerHTML = '<div class="no-data">暂无匹配的公告</div>';
        return;
    }
    
    list.innerHTML = pageData.map(item => {
        const slotClass = item.slot === '上午' ? 'tag-slot-morning' : item.slot === '下午' ? 'tag-slot-afternoon' : 'tag-slot-evening';
        const budgetHtml = item.budget ? `<span class="card-budget">💰 ${item.budget}</span>` : '';
        const keywordsHtml = item.keywords.map(k => `<span class="keyword">${k}</span>`).join('');
        return `
            <div class="card">
                <div class="card-header">
                    <div class="card-title" onclick="window.open('${item.link}', '_blank')">${item.title}</div>
                    ${budgetHtml}
                </div>
                <div class="card-meta">
                    <span>📅 ${item.pubDate}</span>
                    <span>📍 ${item.source}</span>
                    <span>🕐 ${item.slot}</span>
                    <span class="tag ${slotClass}">${item.slot}</span>
                </div>
                <div class="card-keywords">${keywordsHtml}</div>
                <div class="card-desc">${item.description}</div>
            </div>
        `;
    }).join('');
    
    document.getElementById('filterCount').textContent = filteredData.length;
    renderPagination();
}

function renderPagination() {
    const totalPages = Math.ceil(filteredData.length / pageSize);
    const pagination = document.getElementById('pagination');
    let html = '';
    
    html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">上一页</button>`;
    
    for (let i = 1; i <= Math.min(totalPages, 5); i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    
    if (totalPages > 5) {
        html += `<span style="padding: 8px;">...</span>`;
        html += `<button onclick="goPage(${totalPages})">${totalPages}</button>`;
    }
    
    html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">下一页</button>`;
    
    pagination.innerHTML = html;
}

function goPage(page) {
    const totalPages = Math.ceil(filteredData.length / pageSize);
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderAnnouncements(page);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function filterAnnouncements() {
    const keyword = document.getElementById('searchKeyword').value.toLowerCase();
    const type = document.getElementById('filterType').value;
    const source = document.getElementById('filterSource').value;
    const date = document.getElementById('filterDate').value;
    
    filteredData = DATA.announcements.filter(item => {
        const matchKeyword = !keyword || item.title.toLowerCase().includes(keyword) || item.description.toLowerCase().includes(keyword);
        const matchType = !type || item.keywords.includes(type);
        const matchSource = !source || item.source.includes(source);
        const matchDate = !date || item.pubDate === date;
        return matchKeyword && matchType && matchSource && matchDate;
    });
    
    currentPage = 1;
    renderAnnouncements(currentPage);
}

function resetFilters() {
    document.getElementById('searchKeyword').value = '';
    document.getElementById('filterType').value = '';
    document.getElementById('filterSource').value = '';
    document.getElementById('filterDate').value = '';
    filteredData = [...DATA.announcements];
    currentPage = 1;
    renderAnnouncements(currentPage);
}

function exportCSV() {
    const headers = ['ID', '标题', '发布日期', '来源', '关键词', '预算', '描述', '链接'];
    const rows = filteredData.map(item => [
        item.id, item.title, item.pubDate, item.source, 
        item.keywords.join(';'), item.budget || '', item.description, item.link
    ]);
    
    const csvContent = [headers, ...rows].map(r => r.map(v => `"${(v || '').replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `招标公告_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
}

document.getElementById('totalCount').textContent = DATA.totalCount;
document.getElementById('updateTime').textContent = DATA.lastUpdate.split(' ')[0];
renderAnnouncements(currentPage);
</script>
